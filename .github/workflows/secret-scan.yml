name: Secret scan

# WP0 — fail the build if a credential is committed. Runs on every push and PR,
# and weekly so a key committed before this workflow existed still surfaces.
on:
  push:
  pull_request:
  schedule:
    - cron: '0 6 * * 1'

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history: catches keys committed in the past
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
