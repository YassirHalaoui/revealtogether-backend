spring:
  application:
    name: revealtogether
  threads:
    virtual:
      enabled: true

  # Redis Configuration (Upstash)
  data:
    redis:
      url: ${UPSTASH_REDIS_URL:redis://localhost:6379}
      timeout: 5000ms

  # Jackson Configuration
  jackson:
    default-property-inclusion: non_null

# Server Configuration
server:
  port: ${PORT:8181}

# Application Configuration
app:
  base-url: ${BASE_URL:http://localhost:3000}
  cors:
    allowed-origins: ${ALLOWED_ORIGINS:http://localhost:3000}
  firebase:
    credentials: ${FIREBASE_CREDENTIALS:}
    # For localhost: load from resources folder (leave empty for prod)
    credentials-file: ${FIREBASE_CREDENTIALS_FILE:revealtogether-test-firebase-adminsdk-fbsvc-11c2401156.json}
  redis:
    ttl:
      session-hours: 24
      post-reveal-hours: 1
  broadcast:
    interval-ms: 500
  # Tiered-pricing seat gate. Grace factor pads the marketing limit so
  # concurrent-join races and accidental double-counts never become support
  # tickets. Watch window: over-cap guests get watch_only (not a closed door)
  # this close to the reveal moment.
  seats:
    grace-factor: 1.2
    watch-window-minutes: 45
  # Shared secret for Vercel -> Spring server-to-server calls (refresh-tier).
  internal-secret: ${INTERNAL_API_SECRET:}
  # Opaque public reveal links (opaqueRevealLinksV1). Generous per-IP limit so
  # a NAT'd party never trips it; per-IP+token gets half of it.
  public-links:
    lookups-per-ip-per-minute: 120
  # WP2 command envelope. Idempotency only engages when a client sends
  # Idempotency-Key, so this is a no-op for current clients.
  command:
    idempotency-enabled: ${COMMAND_IDEMPOTENCY_ENABLED:true}
    idempotency-ttl-hours: 48
  # WP4 enveloped stream on /topic/reveal/{id}. Dual-published alongside the
  # legacy topics; kill switch for coexistence.
  realtime:
    envelope-enabled: ${REALTIME_ENVELOPE_ENABLED:true}
  chat:
    max-messages: 500
    max-length: 280
  name:
    max-length: 50

# Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    tags:
      application: ${spring.application.name}

# Logging Configuration
logging:
  level:
    root: ${LOG_LEVEL:INFO}
    revealtogether: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} [%X{traceId:-}] - %msg%n"
